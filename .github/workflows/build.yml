name: Build iOS App

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      signing:
        description: "导出签名的 .ipa（需要设置 APPLE_ID 和 APPLE_APP_SPECIFIC_PASSWORD 两个 GitHub Secrets）"
        type: choice
        options:
          - unsigned
          - signed
        default: unsigned

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build (unsigned)
        if: ${{ github.event.inputs.signing != 'signed' }}
        run: |
          xcodebuild archive \
            -project TimelineNotes.xcodeproj \
            -scheme TimelineNotes \
            -archivePath ./build/TimelineNotes.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Build (signed with Apple ID)
        if: ${{ github.event.inputs.signing == 'signed' }}
        run: |
          xcodebuild archive \
            -project TimelineNotes.xcodeproj \
            -scheme TimelineNotes \
            -archivePath ./build/TimelineNotes.xcarchive \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_STYLE=Automatic

      - name: Export unsigned .ipa for sideloading
        if: ${{ github.event.inputs.signing != 'signed' }}
        run: |
          mkdir -p ./build/Payload
          cp -R ./build/TimelineNotes.xcarchive/Products/Applications/TimelineNotes.app ./build/Payload/
          cd ./build
          zip -r TimelineNotes.ipa Payload/
          cd ..

      - name: Export signed .ipa
        if: ${{ github.event.inputs.signing == 'signed' }}
        run: |
          xcodebuild -exportArchive \
            -archivePath ./build/TimelineNotes.xcarchive \
            -exportPath ./build/export \
            -exportOptionsPlist ./ExportOptions.plist \
            -allowProvisioningUpdates

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: TimelineNotes-iOS
          path: |
            ./build/TimelineNotes.ipa
            ./build/export/*.ipa
          retention-days: 30
