name: Build iOS App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Build unsigned app
        run: |
          xcodebuild archive \
            -project TimelineNotes.xcodeproj \
            -scheme TimelineNotes \
            -archivePath ./build/TimelineNotes.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package unsigned .ipa
        run: |
          mkdir -p ./build/Payload
          cp -R ./build/TimelineNotes.xcarchive/Products/Applications/TimelineNotes.app ./build/Payload/
          cd ./build
          zip -r TimelineNotes.ipa Payload/

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: TimelineNotes-iOS
          path: ./build/TimelineNotes.ipa
          retention-days: 30
