name: TimelineNotes
options:
  bundleIdPrefix: com.timelinenotes
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  TimelineNotes:
    type: application
    platform: iOS
    sources:
      - path: TimelineNotes/TimelineNotes
    settings:
      base:
        INFOPLIST_FILE: ""
        PRODUCT_BUNDLE_IDENTIFIER: com.timelinenotes.app
        INFOPLIST_KEY_CFBundleDisplayName: "时间线笔记"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchStoryboardName: ""
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO

  TimelineNotesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TimelineNotes/TimelineNotesTests
    dependencies:
      - target: TimelineNotes
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
